@if (showControl()) {
  <div
    data-test="forge-form-field-container"
    [class]="
      'forge-form-field-container forge-form-field-container--' +
      labelOrientation()
    "
    [style.width]="controlSchema().options?.width || 'auto'">
    @if (controlSchema().label) {
      <label
        class="forge-form-field-label"
        data-test="forge-form-field-label"
        [attr.for]="controlSchema().controlName">
        {{ controlSchema().label }}
      </label>
    }

    <ng-container
      *ngComponentOutlet="
        componentType();
        inputs: {
          control: control(),
          controlSchema: controlSchema(),
          isValid: isValid(),
        }
      " />

    <forge-form-hint-renderer
      [control]="control()"
      [controlSchema]="controlSchema()" />

    <forge-form-error-renderer
      [control]="control()"
      [controlSchema]="controlSchema()" />
  </div>
}
